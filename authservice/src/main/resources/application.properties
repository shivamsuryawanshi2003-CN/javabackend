spring.application.name=authservice

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/authdb}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


server.port=8081
# Trust X-Forwarded-* when behind API Gateway (OAuth public URLs / cookies)
server.forward-headers-strategy=framework

# Actuator: expose only health for probes (SecurityConfig permits /actuator/health without auth)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Where OAuth2SuccessHandler sends the browser after social login (Next dev server)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}
# Set JWT_SECRET in environment or jobra-backend/.env/local.env (see scripts/load-env.*)
jwt.secret=${JWT_SECRET:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}



# GOOGLE — set GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET (e.g. from .env/local.env)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:not-configured}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:not-configured}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# GITHUB
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:not-configured}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:not-configured}

spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Microsoft Entra ID (multi-tenant "common").
spring.security.oauth2.client.registration.azure.client-id=${AZURE_AD_CLIENT_ID:not-configured}
spring.security.oauth2.client.registration.azure.client-secret=${AZURE_AD_CLIENT_SECRET:not-configured}
spring.security.oauth2.client.registration.azure.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.azure.scope=openid,profile,email
spring.security.oauth2.client.registration.azure.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.azure.authorization-uri=https://login.microsoftonline.com/common/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure.token-uri=https://login.microsoftonline.com/common/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure.jwk-set-uri=https://login.microsoftonline.com/common/discovery/v2.0/keys
spring.security.oauth2.client.provider.azure.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.azure.user-name-attribute=sub

# LinkedIn (OpenID Connect)
spring.security.oauth2.client.registration.linkedin.client-id=${LINKEDIN_CLIENT_ID:not-configured}
spring.security.oauth2.client.registration.linkedin.client-secret=${LINKEDIN_CLIENT_SECRET:not-configured}
spring.security.oauth2.client.registration.linkedin.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.linkedin.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.linkedin.scope=openid,profile,email
spring.security.oauth2.client.provider.linkedin.issuer-uri=https://www.linkedin.com/oauth

logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO


server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
server.servlet.session.tracking-modes=cookie

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
app.kafka.registration-topic=${REGISTRATION_TOPIC:notification.send}
auth.internal-api-key=${AUTH_INTERNAL_API_KEY:}

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId:-}] %logger{36} - %msg%n
